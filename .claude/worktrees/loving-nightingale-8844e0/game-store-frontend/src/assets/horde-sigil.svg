<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sigilMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c79a5e"/>
      <stop offset="50%" stop-color="#a07348"/>
      <stop offset="100%" stop-color="#5a463a"/>
    </linearGradient>
    <radialGradient id="sigilGlow" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#ff7a2b" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#c2281a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5a1412" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Круглая основа — знамя -->
  <circle cx="32" cy="32" r="29" fill="url(#sigilGlow)" stroke="url(#sigilMetal)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#1a1410" stroke-width="1" opacity="0.5"/>

  <!-- Центральный клык (вниз) -->
  <path d="M32 14 L27 40 L32 48 L37 40 Z"
        fill="#1a1410" stroke="url(#sigilMetal)" stroke-width="1.4" stroke-linejoin="miter"/>

  <!-- Левый клык -->
  <path d="M15 22 L17 40 L23 42 L22 26 Z"
        fill="#1a1410" stroke="url(#sigilMetal)" stroke-width="1.3" stroke-linejoin="miter"/>

  <!-- Правый клык -->
  <path d="M49 22 L47 40 L41 42 L42 26 Z"
        fill="#1a1410" stroke="url(#sigilMetal)" stroke-width="1.3" stroke-linejoin="miter"/>

  <!-- Нижняя дуга — челюсть -->
  <path d="M16 40 Q32 56 48 40"
        fill="none" stroke="url(#sigilMetal)" stroke-width="2" stroke-linecap="round"/>

  <!-- Верхняя рунная отметка -->
  <circle cx="32" cy="11" r="1.8" fill="#c79a5e"/>
</svg>
