# fly.toml — конфигурация Fly.io для Laravel-бэка
# Деплоится из game-store-backend/ (Working directory в форме Fly).
# Имя приложения должно совпадать с тем, что выдала Fly при создании.

app = "game-l6voba"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

# ── Переменные окружения (не секретные) ──
# Секреты (APP_KEY, DATABASE_URL и т.п.) ставятся через `flyctl secrets set ...`
# или в форме Fly раздел "Переменные окружения".
[env]
  APP_NAME = "GameStore"
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://game-l6voba.fly.dev"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "warning"
  DB_CONNECTION = "pgsql"
  SESSION_DRIVER = "database"
  CACHE_DRIVER = "database"
  QUEUE_CONNECTION = "database"
  BROADCAST_CONNECTION = "reverb"
  # Старый алиас на всякий случай (Laravel <11)
  BROADCAST_DRIVER = "reverb"
  # Reverb сервер — слушает на 8081 внутри машины. Внешне через 8443 (TLS).
  # См. блок [[services]] ниже про Reverb processes.
  REVERB_HOST = "game-l6voba.fly.dev"
  REVERB_PORT = "8443"
  REVERB_SCHEME = "https"
  REVERB_SERVER_HOST = "0.0.0.0"
  REVERB_SERVER_PORT = "8081"
  # FILESYSTEM_DISK переключим с 'local' на 'r2' в Phase 1 / Batch E,
  # после того как мигрируем все существующие файлы (storage:link → R2).
  # Пока остаётся 'local' (Fly volume), R2 настроен в config/filesystems.php
  # и готов к использованию когда выставим секреты.
  FILESYSTEM_DISK = "local"
  # Sanctum: список доменов, которые могут получать sanctum-cookie.
  # Фронт на Firebase Hosting — добавим его сюда.
  SANCTUM_STATEFUL_DOMAINS = "game-45428688-fe94e.web.app,game-45428688-fe94e.firebaseapp.com,game-l6voba.fly.dev"
  SESSION_DOMAIN = ".fly.dev"
  SESSION_SECURE_COOKIE = "true"

  # ── Cloudflare R2 (Phase 1 / Batch D) ─────────────────────────────────
  # Сами секреты (R2_KEY, R2_SECRET) ставятся через
  #   flyctl secrets set R2_KEY=... R2_SECRET=... --app game-l6voba
  # и НЕ должны попадать в этот файл (он в git).
  # Здесь только "не-секретные" значения: бакет и endpoint.
  # R2_BUCKET и R2_ENDPOINT обновятся реальными значениями после того,
  # как пользователь создаст бакет в Cloudflare. Пока placeholder'ы:
  R2_BUCKET = "gamestore-media"
  # R2_ENDPOINT и R2_PUBLIC_URL заполнятся через flyctl secrets когда
  # будут реальные ключи (endpoint содержит account_id который мы не
  # светим в публичном файле).

# ── Release command ──
# Запускается ПОСЛЕ старта Postgres-сайдкара и до публикации новой версии.
# Если миграции упадут — деплой откатится.
[deploy]
  release_command = "sh -c 'php artisan migrate --force && php artisan db:seed --class=RolesPermissionsSeeder --force && php artisan db:seed --class=UserRolesBackfillSeeder --force && php artisan storage:link || true && php artisan config:cache && php artisan route:cache && php artisan view:cache'"

# ── Многопроцессная конфигурация ──
# Apache (HTTP API) и Reverb (WebSocket для realtime в Phase 4)
# работают как ДВА отдельных процесса. Fly запустит каждый в своей машине.
# Обе машины — auto_stop, никаких min_machines_running, $0/мес.
[processes]
  app = "apache2-foreground"
  reverb = "php artisan reverb:start --host=0.0.0.0 --port=8081"

# ── HTTP-сервис (Apache + Laravel API) ──
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"     # засыпает после простоя — экономит часы
  auto_start_machines = true      # просыпается на первом запросе
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"          # Apache+Laravel cold-start ~10-20с
    method = "GET"
    path = "/up"
    protocol = "http"

# ── Reverb WebSocket-сервис ──
# Внешний порт 8443 (TLS) → внутренний 8081 на reverb-машине.
# 8443 потому что 443 уже занят Apache. Frontend Echo подключается к
#   wss://game-l6voba.fly.dev:8443/
# Auto_stop как у Apache: WS-машина спит, юзер заходит в чат → wake-up
# (cold-start ~5-15с), Echo переподключается. После 5 мин idle — sleep.
[[services]]
  internal_port = 8081
  protocol = "tcp"
  processes = ["reverb"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 8443
    handlers = ["tls", "http"]

  # Без health-check'а — Reverb не имеет /up endpoint'а, и попытка
  # дёрнуть произвольный путь по WS-серверу через HTTP даст ошибку.
  # Fly будет считать машину healthy если процесс не упал.

# ── Размер машины ──
# 512MB вместо 256 — на 256 Apache+Laravel живут впритык, при cold-start OOM.
# Те же 512MB используются и для Reverb-машины.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
