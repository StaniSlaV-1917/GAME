
services:
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./game-store-frontend:/app
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev"

  backend:
    build:
      context: ./game-store-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./game-store-backend:/var/www/html
    environment:
      - "DB_CONNECTION=sqlite"
      - "DB_DATABASE=/var/www/html/database/database.sqlite"
